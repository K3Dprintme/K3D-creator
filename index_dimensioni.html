<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K3D Dimensioni</title>

<style>
/* =========================
   SFONDO AVORIO
========================= */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f6f1e6;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* =========================
   CONTAINER
========================= */
.box {
  width: 420px;
  background: rgba(255,255,255,0.7);
  border-radius: 18px;
  padding: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  backdrop-filter: blur(4px);
}

/* =========================
   PREVIEW
========================= */
.preview {
  width: 100%;
  height: 220px;
  background: #eef2f7;
  border-radius: 14px;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 20px;
  overflow: hidden;
  position: relative;
}

/* OGGETTO AZZURRO */
.object {
  background: #4db7ff;
  border-radius: 8px;
  transition: all 0.2s ease;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

/* =========================
   SLIDERS
========================= */
label {
  font-size: 14px;
  font-weight: bold;
  display: block;
  margin-top: 12px;
  color: #1a2a44;
}

input[type="range"] {
  width: 100%;
  accent-color: #4db7ff;
}

.value {
  font-size: 13px;
  color: #4db7ff;
  margin-bottom: 6px;
}

/* =========================
   BOTTONI
========================= */
button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 12px;
  background: #4db7ff;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #2ea6ff;
}
</style>
</head>

<body>

<div class="box">

  <div class="preview">
    <div id="obj" class="object"></div>
  </div>

  <label>Lunghezza (mm)</label>
  <div class="value" id="valL">50</div>
  <input type="range" id="length" min="0" max="180" value="50">

  <label>Larghezza (mm)</label>
  <div class="value" id="valW">50</div>
  <input type="range" id="width" min="0" max="180" value="50">

  <button onclick="saveAndReturn()">Conferma dimensioni</button>

</div>

<script>

const length = document.getElementById("length");
const width = document.getElementById("width");

const valL = document.getElementById("valL");
const valW = document.getElementById("valW");

const obj = document.getElementById("obj");

/* =========================
   UPDATE PREVIEW
========================= */
function update() {

  const l = parseInt(length.value);
  const w = parseInt(width.value);

  valL.innerText = l + " mm";
  valW.innerText = w + " mm";

  // scala visiva (non real scale ma proporzionale)
  obj.style.width = (w * 1.2) + "px";
  obj.style.height = (l * 1.2) + "px";
}

length.addEventListener("input", update);
width.addEventListener("input", update);

/* =========================
   SALVA E TORNA AL TRONCO
========================= */
function saveAndReturn() {

  const data = {
    length: parseInt(length.value),
    width: parseInt(width.value)
  };

  // 🔥 salva per il tronco
  localStorage.setItem("k3d_dimensions", JSON.stringify(data));

  window.location.href = "index_tronco.html";
}

/* =========================
   INIT (se esiste già dato)
========================= */
function init() {

  const saved = localStorage.getItem("k3d_dimensions");

  if (saved) {
    const d = JSON.parse(saved);

    length.value = d.length;
    width.value = d.width;
  }

  update();
}

init();

</script>

</body>
</html>
