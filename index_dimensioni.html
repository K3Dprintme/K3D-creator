<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K3D - Dimensioni 3D SOLID FIX</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#f6f1e6,#efe7d6);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#333;
}

.wrapper{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:22px;
}

.scene{
  width:340px;
  height:340px;
  perspective:900px;
  position:relative;
  background:rgba(255,255,255,0.55);
  border:1px solid rgba(120,160,200,0.25);
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  overflow:hidden;
}

.world{
  width:100%;
  height:100%;
  position:absolute;
  transform-style:preserve-3d;
  transform:rotateX(-25deg) rotateY(35deg);
}

.axis{
  position:absolute;
  top:50%;
  left:50%;
  transform-origin:center;
  opacity:0.75;
}

.axis.x{width:200px;height:2px;background:#ff6b6b;transform:translate(-50%,-50%);}
.axis.y{width:200px;height:2px;background:#4cd137;transform:translate(-50%,-50%) rotateZ(90deg);}
.axis.z{width:200px;height:2px;background:#4aa3ff;transform:translate(-50%,-50%) rotateX(90deg);}

.box{
  position:absolute;
  top:50%;
  left:50%;
  transform-style:preserve-3d;
  transform:translate(-50%,-50%);
}

.face{
  position:absolute;
  top:50%;
  left:50%;
  transform-style:preserve-3d;
  backface-visibility:hidden;
  background:rgba(74,163,255,0.25);
  border:1px solid rgba(74,163,255,0.35);
}

.controls{
  display:flex;
  flex-direction:column;
  gap:14px;
  width:260px;
  padding:14px;
  background:rgba(255,255,255,0.6);
  border:1px solid rgba(120,160,200,0.2);
  border-radius:14px;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

label{font-size:13px;}

.rangeWrap{
  display:flex;
  align-items:center;
  gap:8px;
}

.valueBox{
  font-size:12px;
  min-width:32px;
  text-align:right;
  color:#4aa3ff;
  font-weight:600;
}

input[type=range]{
  width:100%;
  accent-color:#4aa3ff;
}

button{
  padding:10px;
  border:none;
  background:linear-gradient(90deg,#4aa3ff,#6bbcff);
  color:white;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="scene">
    <div class="world">

      <div class="axis x"></div>
      <div class="axis y"></div>
      <div class="axis z"></div>

      <div class="box" id="box">
        <div class="face" id="front"></div>
        <div class="face" id="back"></div>
        <div class="face" id="left"></div>
        <div class="face" id="right"></div>
        <div class="face" id="top"></div>
        <div class="face" id="bottom"></div>
      </div>

    </div>
  </div>

  <div class="controls">

    <label>X (lunghezza)</label>
    <div class="rangeWrap">
      <input type="range" id="x" min="1" max="180" value="80">
      <div class="valueBox" id="xVal">80</div>
    </div>

    <label>Y (profondità)</label>
    <div class="rangeWrap">
      <input type="range" id="y" min="1" max="180" value="80">
      <div class="valueBox" id="yVal">80</div>
    </div>

    <label>Z (altezza)</label>
    <div class="rangeWrap">
      <input type="range" id="z" min="1" max="180" value="80">
      <div class="valueBox" id="zVal">80</div>
    </div>

    <button onclick="saveAndReturn()">Salva e torna</button>
  </div>

</div>

<script>
const box = document.getElementById("box");

const xS = document.getElementById("x");
const yS = document.getElementById("y");
const zS = document.getElementById("z");

const xVal = document.getElementById("xVal");
const yVal = document.getElementById("yVal");
const zVal = document.getElementById("zVal");

const front = document.getElementById("front");
const back = document.getElementById("back");
const left = document.getElementById("left");
const right = document.getElementById("right");
const topF = document.getElementById("top");
const bottom = document.getElementById("bottom");

function update(){

  const x = parseInt(xS.value);
  const y = parseInt(yS.value);
  const z = parseInt(zS.value);

  xVal.textContent = x;
  yVal.textContent = y;
  zVal.textContent = z;

  front.style.width = x + "px";
  front.style.height = z + "px";
  front.style.transform = `translate(-50%,-50%) translateZ(${y/2}px)`;

  back.style.width = x + "px";
  back.style.height = z + "px";
  back.style.transform = `translate(-50%,-50%) rotateY(180deg) translateZ(${y/2}px)`;

  left.style.width = y + "px";
  left.style.height = z + "px";
  left.style.transform = `translate(-50%,-50%) rotateY(-90deg) translateZ(${x/2}px)`;

  right.style.width = y + "px";
  right.style.height = z + "px";
  right.style.transform = `translate(-50%,-50%) rotateY(90deg) translateZ(${x/2}px)`;

  topF.style.width = x + "px";
  topF.style.height = y + "px";
  topF.style.transform = `translate(-50%,-50%) rotateX(90deg) translateZ(${z/2}px)`;

  bottom.style.width = x + "px";
  bottom.style.height = y + "px";
  bottom.style.transform = `translate(-50%,-50%) rotateX(-90deg) translateZ(${z/2}px)`;
}

xS.addEventListener("input", update);
yS.addEventListener("input", update);
zS.addEventListener("input", update);

function saveAndReturn(){
  localStorage.setItem("k3d_dimensions", JSON.stringify({x:xS.value,y:yS.value,z:zS.value}));
  window.location.href = "index_tronco.html";
}

function init(){
  const saved = localStorage.getItem("k3d_dimensions");
  if(saved){
    const d = JSON.parse(saved);
    xS.value = d.x || 80;
    yS.value = d.y || 80;
    zS.value = d.z || 80;
  }
  update();
}

init();
</script>

</body>
</html>
