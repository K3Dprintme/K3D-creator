<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K3D - Dimensioni 3D SOLID FIX</title>

<style>

.subtitle {
  font-size: 18px;
  font-family: Cormorant SC;
  max-width: 420px;
  margin: 12px auto 22px;
  line-height: 1.6;
  font-weight: 500;
  color: #1a2a44;

  background: rgba(255,255,255,0.72);
  backdrop-filter: blur(2px);

  padding: 14px 18px;
  border-radius: 18px;

  box-shadow: 0 4px 10px rgba(0,0,0,0.05);

  opacity: 0.5;
  transform: translateY(10px);
  animation: fadeUp 1s ease forwards;

   border-bottom: 3px solid #4db7ff;
   border-top: 3px solid #4db7ff;

}




body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#f6f1e6,#efe7d6);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#333;
}

.wrapper{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:22px;
}

.scene{
  width:340px;
  height:340px;
  perspective:900px;
  position:relative;
  background:rgba(255,255,255,0.55);
  border:1px solid rgba(120,160,200,0.25);
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  overflow:hidden;
}

.world{
  width:100%;
  height:100%;
  position:absolute;
  transform-style:preserve-3d;
  transform:rotateX(-25deg) rotateY(35deg);
}

.axis{
  position:absolute;
  top:50%;
  left:50%;
  transform-origin:center;
  opacity:0.75;
}

.axis.x{width:200px;height:2px;background:#ff6b6b;transform:translate(-50%,-50%);}
.axis.y{width:200px;height:2px;background:#4cd137;transform:translate(-50%,-50%) rotateZ(90deg);}
.axis.z{width:200px;height:2px;background:#4aa3ff;transform:translate(-50%,-50%) rotateX(90deg);}

.box{
  position:absolute;
  top:50%;
  left:50%;
  transform-style:preserve-3d;
  transform:translate(-50%,-50%);
}

.face{
  position:absolute;
  top:50%;
  left:50%;
  transform-style:preserve-3d;
  backface-visibility:hidden;
  background:rgba(74,163,255,0.25);
  border:1px solid rgba(74,163,255,0.35);
}

.controls{
  display:flex;
  flex-direction:column;
  gap:14px;
  width:260px;
  padding:14px;
  background:rgba(255,255,255,0.6);
  border:1px solid rgba(120,160,200,0.2);
  border-radius:14px;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

label{font-size:13px;}

.rangeWrap{
  display:flex;
  align-items:center;
  gap:8px;
}

.valueBox{
  font-size:12px;
  min-width:32px;
  text-align:right;
  color:#4aa3ff;
  font-weight:600;
}

input[type=range]{
  width:100%;
  accent-color:#4aa3ff;
}

button{
  padding:10px;
  border:none;
  background:linear-gradient(90deg,#4aa3ff,#6bbcff);
  color:white;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

#three-container{
  width:100%;
  height:100%;
  position:relative;
}

.scene{
  width:340px;
  height:340px;
  perspective:none;
  position:relative;
  background:rgba(255,255,255,0.55);
  border:1px solid rgba(120,160,200,0.25);
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  overflow:hidden;
}


</style>



</head>


<body>



<div class="wrapper">


<div class="scene">
  <div id="three-container"></div>
</div>

  <div class="controls">

    <label>X (lunghezza)</label>
    <div class="rangeWrap">
      <input type="range" id="x" min="1" max="180" value="80">
      <div class="valueBox" id="xVal">80</div>
    </div>

    <label>Y (profondità)</label>
    <div class="rangeWrap">
      <input type="range" id="y" min="1" max="180" value="80">
      <div class="valueBox" id="yVal">80</div>
    </div>

    <label>Z (altezza)</label>
    <div class="rangeWrap">
      <input type="range" id="z" min="1" max="180" value="80">
      <div class="valueBox" id="zVal">80</div>
    </div>

    <button onclick="saveAndReturn()">Salva e torna</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>

// =====================
// UI
// =====================
const xS = document.getElementById("x");
const yS = document.getElementById("y");
const zS = document.getElementById("z");

const xVal = document.getElementById("xVal");
const yVal = document.getElementById("yVal");
const zVal = document.getElementById("zVal");

const container = document.getElementById("three-container");

// =====================
// SCENA
// =====================
const scene3D = new THREE.Scene();
scene3D.background = new THREE.Color(0xf5f1e8);

// =====================
// CAMERA
// =====================
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
camera.position.set(3.5, 2.5, 4.5);
camera.lookAt(0, 0, 0);
camera.updateProjectionMatrix();

// =====================
// RENDERER
// =====================
const renderer = new THREE.WebGLRenderer({
  antialias: true,
  alpha: true
});

renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(window.devicePixelRatio);

renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

container.appendChild(renderer.domElement);

// =====================
// LUCI
// =====================
const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
scene3D.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
dirLight.position.set(2, 4, 3);
const fillLight = new THREE.DirectionalLight(0xffffff, 0.4);
fillLight.position.set(-3, 2, -2);
scene3D.add(fillLight);
dirLight.castShadow = true;
scene3D.add(dirLight);

// =====================
// CUBO
// =====================
const geometry = new THREE.BoxGeometry(1.2, 1.2, 1.2);

const material = new THREE.MeshStandardMaterial({
  color: 0x4aa3ff,
  roughness: 0.55,
  metalness: 0.0
});

const cube = new THREE.Mesh(geometry, material);
cube.castShadow = true;
cube.receiveShadow = false;
cube.position.y = 0.2;

scene3D.add(cube);
cube.position.y = 0.15;

// =====================
// PIANO
// =====================
const planeGeo = new THREE.CircleGeometry(2, 40);

const planeMat = new THREE.MeshStandardMaterial({
  color: 0xf0f0f0,
  roughness: 0.95,
  metalness: 0.0
});

const floor = new THREE.Mesh(planeGeo, planeMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -1;
floor.receiveShadow = true;

scene3D.add(floor);

// =====================
// UPDATE
// =====================
function update() {

  const x = parseInt(xS.value);
  const y = parseInt(yS.value);
  const z = parseInt(zS.value);

  xVal.textContent = x;
  yVal.textContent = y;
  zVal.textContent = z;

  cube.scale.x = x / 80;
  cube.scale.y = z / 80;
  cube.scale.z = y / 80;

  floor.scale.set(
    Math.max(x, y) / 100,
    Math.max(x, y) / 100,
    1
  );
}

// =====================
// ANIMAZIONE
// =====================
function animate() {
  requestAnimationFrame(animate);

  cube.rotation.y += 0.003;

  renderer.render(scene3D, camera);
}

// =====================
// RESIZE
// =====================
function setSize() {
  const w = container.clientWidth;
  const h = container.clientHeight;

  renderer.setSize(w, h);

  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}

window.addEventListener("resize", setSize);

// =====================
// INIT
// =====================
function init() {

  const saved = localStorage.getItem("k3d_dimensions");

  if (saved) {
    const d = JSON.parse(saved);

    xS.value = d.x || 80;
    yS.value = d.y || 80;
    zS.value = d.z || 80;
  }

  update();
  renderer.render(scene3D, camera); // render iniziale sicuro
}

// =====================
// EVENTS
// =====================
xS.addEventListener("input", update);
yS.addEventListener("input", update);
zS.addEventListener("input", update);

// =====================
// SAVE
// =====================
function saveAndReturn() {
  localStorage.setItem("k3d_dimensions", JSON.stringify({
    x: xS.value,
    y: yS.value,
    z: zS.value
  }));

  window.location.href = "index_tronco.html";
}

// =====================
// START
// =====================
init();
setSize();
animate();

</script>
</body>
</html>
