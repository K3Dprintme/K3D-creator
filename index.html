<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K3D Creator</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>

/* =========================
   RESET
========================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Montserrat, sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;

  background:url("AppK3D/background/sfondo/image.PNG") center/cover no-repeat fixed;
  position:relative;
}

/* overlay soft */
body::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(255,255,255,0.55);
  backdrop-filter:blur(3px);
}

/* glow effetto K3D */
.glow{
  position:absolute;
  width:420px;
  height:420px;
  border-radius:50%;
  filter:blur(120px);
  opacity:0.18;
  z-index:0;
}
.glow.left{ background:#4db7ff; left:-120px; top:-120px; }
.glow.right{ background:#00c8ff; right:-120px; bottom:-120px; }

/* =========================
   CARD PRINCIPALE
========================= */
.home-card{
  position:relative;
  z-index:2;

  width:90%;
  max-width:720px;

  padding:50px 30px;
  text-align:center;

  background:rgba(255,255,255,0.78);
  backdrop-filter:blur(12px);

  border-radius:35px;

  border-top:3px solid #4db7ff;
  border-bottom:4px solid #4db7ff;

  box-shadow:0 15px 40px rgba(0,0,0,0.12);

  animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* LOGO */
.logo{
  width:140px;
  margin-bottom:15px;
  filter:drop-shadow(0px 10px 10px rgba(0,0,0,0.15));
}

/* TITLO */
.title{
  font-size:54px;
  font-weight:700;
  color:#00c8ff;
  text-shadow:2px 2px 2px rgba(0,0,0,0.25);
  margin-bottom:10px;
}

.subtitle{
  font-size:18px;
  color:#1a2a44;
  max-width:420px;
  margin:0 auto 25px;
  line-height:1.6;

  background:rgba(255,255,255,0.7);
  padding:12px 16px;
  border-radius:18px;
  border-top:2px solid #4db7ff;
  border-bottom:2px solid #4db7ff;
}

/* CTA BUTTON */
.start-btn{
  margin-top:10px;
  padding:18px 40px;
  font-size:18px;
  font-weight:700;

  border:none;
  border-radius:50px;

  background:linear-gradient(135deg,#4db7ff,#00c8ff);
  color:white;

  cursor:pointer;

  box-shadow:0 10px 25px rgba(77,183,255,0.35);
  transition:0.25s ease;

  position:relative;
  overflow:hidden;
}

.start-btn:hover{
  transform:translateY(-3px) scale(1.02);
  box-shadow:0 15px 35px rgba(77,183,255,0.5);
}

/* piccolo glow interno bottone */
.start-btn::after{
  content:"";
  position:absolute;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:radial-gradient(circle,rgba(255,255,255,0.4),transparent 60%);
  opacity:0;
  transition:0.3s;
}
.start-btn:hover::after{
  opacity:1;
}

/* =========================
   MOBILE
========================= */
@media (max-width:768px){

  .home-card{
    padding:35px 20px;
    border-radius:25px;
  }

  .logo{
    width:110px;
  }

  .title{
    font-size:34px;
  }

  .subtitle{
    font-size:14px;
  }

  .start-btn{
    width:100%;
    font-size:16px;
    padding:16px;
  }
}

</style>
</head>

<body>

<div class="glow left"></div>
<div class="glow right"></div>

<div class="home-card">

  <img src="AppK3D/logoindex/logo.png" class="logo">

  <div class="title">K3D Creator</div>

  <div class="subtitle">
    Dai forma alle tue idee in 3D. <br>
    Configura, personalizza e crea il tuo modello unico.
  </div>

  <button class="start-btn" onclick="window.location.href='index_tronco.html'">
    🚀 Inizia 🚀
  </button>

</div>

</body>
</html>
