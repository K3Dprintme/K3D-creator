<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>K3D Creator</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Arial, sans-serif;
  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  background:url("AppK3D/background/sfondo/image.png") center center fixed;
  background-size:cover;

  overflow:hidden;
  position:relative;
}

/* overlay */
body::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(255,255,255,0.55);
  backdrop-filter:blur(3px);
}

/* container */
.home-box{
  position:relative;
  z-index:2;

  width:90%;
  max-width:700px;

  background:rgba(255,255,255,0.78);
  backdrop-filter:blur(10px);

  border-radius:35px;

  padding:50px 30px;

  text-align:center;

  box-shadow:0 10px 40px rgba(0,0,0,0.08);

  border-top:1px solid #4db7ff;
  border-bottom:2px solid #4db7ff;
}

/* logo */
.logo{
  width:140px;
  margin-bottom:20px;
}

/* title */
h1{
  font-size:65px;
  font-family: Montserrat;
  color:#00c8ff;
  text-shadow:2px 2px 2px blue;
  margin-bottom:10px;
}

/* subtitle */
.subtitle{
  font-size:18px;
  font-family: Montserrat;
  color:#1a2a44;
  line-height:1.8;
  text-shadow:1px 1px 2px grey;
  max-width:500px;
  margin:0 auto 35px auto;
}

/* button */
.start-btn{
  border:none;
  padding:18px 35px;

  border-radius:40px;

  background:#4db7ff;
  color:white;

  font-size:18px;
  cursor:pointer;

  transition:0.25s ease;

  box-shadow:0 6px 18px rgba(77,183,255,0.35);
}

.start-btn:hover{
  transform:translateY(-3px);
}

/* glow */
.glow{
  position:absolute;
  width:400px;
  height:400px;
  background:#8ed8ff;
  filter:blur(120px);
  opacity:0.18;
  border-radius:50%;
  z-index:1;
}

.glow.left{
  left:-120px;
  top:-100px;
}

.glow.right{
  right:-120px;
  bottom:-100px;
}

/* mobile */
@media(max-width:768px){

  h1{
    font-size:48px;
  }

  .subtitle{
    font-size:16px;
  }

  .home-box{
    padding:40px 25px;
  }

}

</style>
</head>

<body>

<div class="glow left"></div>
<div class="glow right"></div>

<div class="home-box">

  <img src="AppK3D/logoindex/logo.png" class="logo">

  <h1>K3D Creator</h1>

  <p class="subtitle">
    Dai forma alla tua idea. 
    Crea il tuo progetto in 3D in pochi passaggi e ricevi un preventivo immediato!
  </p>

  <button class="start-btn" onclick="window.location.href='index/index.html'">
    🚀 Inizia configurazione
  </button>

</div>

<script>

function startCreator() {
  window.location.href = "index/index.html";
}

</script>

</body>
</html>
